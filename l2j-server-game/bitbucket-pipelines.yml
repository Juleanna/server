image: eclipse-temurin:25-jdk-ubi10-minimal

pipelines:
   default:
   -  step:
         caches:
         - maven
         script:
         - /bin/sh mvnw clean install
         artifacts:
         - target/*.zip
   -  step:
         deployment: Production
         script:
         -  pipe: atlassian/ftp-deploy:0.7.1
            variables:
               USER: $FTP_USER
               PASSWORD: $FTP_PASSWORD
               SERVER: $FTP_HOST
               REMOTE_PATH: $FTP_REMOTE_PATH
               LOCAL_PATH: target/
               SET_ARGS: "ftp:ssl-allow yes ftp:ssl-force yes ftp:ssl-protect-data yes ssl:verify-certificate false"