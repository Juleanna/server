image: eclipse-temurin:25-jdk-ubi10-minimal

pipelines:
   branches:
      develop:
      -  step:
            caches:
            - maven
            script:
            - microdnf install -y git
            - git clone --depth=50 -b develop https://bitbucket.org/l2jserver/l2j-server-game.git
            - cd l2j-server-game
            - /bin/sh mvnw clean install -DskipTests -Ddependency-check.skip=true
            - cd ..
      -  step:
            caches:
            - maven
            script:
            - /bin/sh mvnw clean install
            artifacts:
            - target/*.zip
      -  step:
            deployment: Production
            script:
            -  pipe: atlassian/ftp-deploy:0.7.1
               variables:
                  USER: $FTP_USER
                  PASSWORD: $FTP_PASSWORD
                  SERVER: $FTP_HOST
                  REMOTE_PATH: $FTP_REMOTE_PATH
                  LOCAL_PATH: target/
                  SET_ARGS: "ftp:ssl-allow yes ftp:ssl-force yes ftp:ssl-protect-data yes ssl:verify-certificate false"